<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JobTrack — Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">💼</div>
      <div class="logo-name">Job<em>Track</em></div>
    </div>

    <h1 class="auth-title">Welcome back.</h1>
    <p class="auth-sub">Track every application, never miss an opportunity.</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" id="btn-login" onclick="doLogin()">
        Sign In →
      </button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <!-- SIGNUP -->
    <div class="form-panel" id="panel-signup">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your full name" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password"/>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" id="btn-signup" onclick="doSignup()">
        Create Account →
      </button>
      <div class="error-msg" id="signup-error"></div>
    </div>

    <div class="auth-footer">Your data is private, secured with Firebase 🔒</div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA_pPDqaUDifAqVU9HhEdDGGrQpW-KBiY0",
    authDomain: "jobapplicationwebsite-79dfb.firebaseapp.com",
    databaseURL: "https://jobapplicationwebsite-79dfb-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "jobapplicationwebsite-79dfb",
    storageBucket: "jobapplicationwebsite-79dfb.firebasestorage.app",
    messagingSenderId: "942444762404",
    appId: "1:942444762404:web:2b011ae17f9715beeb4fb1",
    measurementId: "G-CZJ33R0F7Z"
  };
</script>

<script>
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.database();

  auth.onAuthStateChanged(u => { if (u) window.location.href = 'dashboard.html'; });

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', (tab === 'login') ? i === 0 : i === 1)
    );
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    const err   = document.getElementById('login-error');
    const btn   = document.getElementById('btn-login');
    if (!email || !pass) return showErr(err, 'Please fill in all fields.');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      await auth.signInWithEmailAndPassword(email, pass);
    } catch(e) {
      showErr(err, friendlyErr(e.code));
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  }

  async function doSignup() {
    const name  = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pass  = document.getElementById('signup-password').value;
    const err   = document.getElementById('signup-error');
    const btn   = document.getElementById('btn-signup');
    if (!name || !email || !pass) return showErr(err, 'Please fill in all fields.');
    if (pass.length < 6) return showErr(err, 'Password must be at least 6 characters.');
    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      await db.ref(`users/${cred.user.uid}/profile`).set({ name, email, createdAt: Date.now() });
    } catch(e) {
      showErr(err, friendlyErr(e.code));
      btn.disabled = false; btn.textContent = 'Create Account →';
    }
  }

  function showErr(el, msg) {
    el.textContent = msg;
    el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  }

  function friendlyErr(code) {
    return ({
      'auth/user-not-found':       'No account with this email.',
      'auth/wrong-password':       'Wrong password. Try again.',
      'auth/email-already-in-use': 'Email already registered.',
      'auth/invalid-email':        'Invalid email address.',
      'auth/weak-password':        'Password is too weak.',
      'auth/too-many-requests':    'Too many attempts. Try later.',
      'auth/invalid-credential':   'Invalid email or password.',
    })[code] || 'Something went wrong. Please try again.';
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.querySelector('.form-panel.active').id === 'panel-login') doLogin();
    else doSignup();
  });
</script>
</body>
</html>
